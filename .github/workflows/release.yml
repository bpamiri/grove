name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            artifact: grove-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: grove-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: grove-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build:web

      - run: bun run build:embed

      - name: Compile binary
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: bun build src/cli/index.ts --compile --target="$TARGET" --outfile "bin/$ARTIFACT"

      - name: Package tarball
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: tar -czf "$ARTIFACT.tar.gz" -C bin "$ARTIFACT"

      - name: Checksum
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: shasum -a 256 "$ARTIFACT.tar.gz" > "$ARTIFACT.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "$(git describe --tags --exact-match HEAD)" | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..HEAD")
          fi
          echo "LOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.LOG }}

            ## Installation

            Download the binary for your platform, extract it, and place it in your `$PATH`.

            **macOS (Apple Silicon)**
            ```sh
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/grove-darwin-arm64.tar.gz
            tar -xzf grove-darwin-arm64.tar.gz
            mv grove-darwin-arm64 /usr/local/bin/grove
            ```

            **macOS (Intel)**
            ```sh
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/grove-darwin-x64.tar.gz
            tar -xzf grove-darwin-x64.tar.gz
            mv grove-darwin-x64 /usr/local/bin/grove
            ```

            **Linux (x64)**
            ```sh
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/grove-linux-x64.tar.gz
            tar -xzf grove-linux-x64.tar.gz
            mv grove-linux-x64 /usr/local/bin/grove
            ```

            Verify checksums with the `.sha256` files included in this release.
          files: |
            grove-darwin-arm64.tar.gz
            grove-darwin-arm64.tar.gz.sha256
            grove-darwin-x64.tar.gz
            grove-darwin-x64.tar.gz.sha256
            grove-linux-x64.tar.gz
            grove-linux-x64.tar.gz.sha256
