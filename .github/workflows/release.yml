name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        env:
          BUMP_TYPE: ${{ inputs.bump }}
        run: npm version "$BUMP_TYPE" --no-git-tag-version

      - name: Sync GROVE_VERSION
        run: bun run scripts/sync-version.ts

      - name: Generate changelog
        run: npx changelogen --no-bump --no-push

      - name: Extract version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        run: |
          git add package.json src/shared/types.ts CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"

  build:
    needs: version-bump
    strategy:
      matrix:
        include:
          - runner: macos-14
            artifact: grove-darwin-arm64
            target: bun-darwin-arm64
          - runner: macos-14
            artifact: grove-darwin-x64
            target: bun-darwin-x64
          - runner: ubuntu-latest
            artifact: grove-linux-x64
            target: bun-linux-x64
          - runner: ubuntu-latest
            artifact: grove-windows-x64
            target: bun-windows-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Build web assets
        run: bun run build:web

      - name: Embed web assets
        run: bun run build:embed

      - name: Embed bundled skills
        run: bun run build:embed-skills

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p bin
          bun build src/cli/index.ts --compile --target="$TARGET" --outfile bin/grove

      - name: Package tarball and checksum
        run: |
          if [ -f bin/grove.exe ]; then
            tar -czf ${{ matrix.artifact }}.tar.gz -C bin grove.exe
          else
            tar -czf ${{ matrix.artifact }}.tar.gz -C bin grove
          fi
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: [version-bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.tag }}
          name: Grove ${{ needs.version-bump.outputs.tag }}
          generate_release_notes: true
          files: release/*

  update-homebrew:
    needs: [version-bump, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download checksum artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract checksums
        id: checksums
        run: |
          sha_darwin_arm64=$(awk '{print $1}' artifacts/grove-darwin-arm64/grove-darwin-arm64.tar.gz.sha256)
          sha_darwin_x64=$(awk '{print $1}' artifacts/grove-darwin-x64/grove-darwin-x64.tar.gz.sha256)
          sha_linux_x64=$(awk '{print $1}' artifacts/grove-linux-x64/grove-linux-x64.tar.gz.sha256)
          echo "sha_darwin_arm64=$sha_darwin_arm64" >> "$GITHUB_OUTPUT"
          echo "sha_darwin_x64=$sha_darwin_x64" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x64=$sha_linux_x64" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - name: Clone homebrew-grove
        run: |
          git clone https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/bpamiri/homebrew-grove.git
          cd homebrew-grove
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update formula
        env:
          VERSION: ${{ needs.version-bump.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.checksums.outputs.sha_darwin_arm64 }}
          SHA_DARWIN_X64: ${{ steps.checksums.outputs.sha_darwin_x64 }}
          SHA_LINUX_X64: ${{ steps.checksums.outputs.sha_linux_x64 }}
        run: |
          sed \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__SHA_DARWIN_ARM64__|${SHA_DARWIN_ARM64}|g" \
            -e "s|__SHA_DARWIN_X64__|${SHA_DARWIN_X64}|g" \
            -e "s|__SHA_LINUX_X64__|${SHA_LINUX_X64}|g" \
            homebrew/formula-template.rb > homebrew-grove/Formula/grove.rb

      - name: Push formula update
        env:
          VERSION: ${{ needs.version-bump.outputs.version }}
        run: |
          cd homebrew-grove
          git add Formula/grove.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "grove v${VERSION}"
          git push
