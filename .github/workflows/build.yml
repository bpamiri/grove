name: Build

on:
  push:
    branches: [main]

concurrency:
  group: build-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Run tests
        run: bun test tests/

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: grove-linux-x64
          - target: bun-darwin-arm64
            artifact: grove-darwin-arm64
          - target: bun-darwin-x64
            artifact: grove-darwin-x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Build web assets
        run: bun run build:web

      - name: Embed web assets
        run: bun run build:embed

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p bin
          bun build src/cli/index.ts --compile --target="$TARGET" --outfile bin/grove

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/grove

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/grove-linux-x64/grove release/grove-linux-x64
          cp artifacts/grove-darwin-arm64/grove release/grove-darwin-arm64
          cp artifacts/grove-darwin-x64/grove release/grove-darwin-x64
          chmod +x release/*

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" &>/dev/null; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* \
              --title "Grove $tag" \
              --generate-notes \
              --prerelease
          fi
