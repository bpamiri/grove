name: Build

on:
  push:
    branches: [main]

concurrency:
  group: build-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Run tests
        run: bun test tests/

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: grove-linux-x64
          - target: bun-darwin-arm64
            artifact: grove-darwin-arm64
          - target: bun-darwin-x64
            artifact: grove-darwin-x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Build web assets
        run: bun run build:web

      - name: Embed web assets
        run: bun run build:embed

      - name: Embed bundled skills
        run: bun run build:embed-skills

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p bin
          bun build src/cli/index.ts --compile --target="$TARGET" --outfile bin/grove

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/grove
