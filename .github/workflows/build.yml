name: Build

on:
  push:
    branches: [main]

concurrency:
  group: build-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Run tests
        run: |
          # Run test directories individually to avoid bun mock.module() hang.
          # Per-directory timeout (60s) kills hung processes so the rest still runs.
          failed=0
          for dir in agents batch broker cli engine integration monitor notifications plugins pr shared skills; do
            echo "::group::tests/$dir/"
            if timeout 60 bun test "tests/$dir/"; then
              echo "::endgroup::"
            else
              code=$?
              echo "::endgroup::"
              if [ $code -eq 124 ]; then
                echo "::error::tests/$dir/ timed out after 60s"
              else
                echo "::error::tests/$dir/ failed with exit code $code"
              fi
              failed=1
            fi
          done
          exit $failed

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: grove-linux-x64
          - target: bun-darwin-arm64
            artifact: grove-darwin-arm64
          - target: bun-darwin-x64
            artifact: grove-darwin-x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Build web assets
        run: bun run build:web

      - name: Embed web assets
        run: bun run build:embed

      - name: Embed bundled skills
        run: bun run build:embed-skills

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p bin
          bun build src/cli/index.ts --compile --target="$TARGET" --outfile bin/grove

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/grove
